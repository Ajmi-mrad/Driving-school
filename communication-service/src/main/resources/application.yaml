spring:
  application:
    name: communication-service

  datasource:
    url: ${COMMUNICATION_DB_URL:jdbc:postgresql://localhost:5436/communicationdb}
    username: ${COMMUNICATION_DB_USER:communicationuser}
    password: ${COMMUNICATION_DB_PASSWORD:communicationpass}

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway possède le schéma ; Hibernate ne fait que valider
    open-in-view: false
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true

  security:
    oauth2:
      # Resource server : valide les JWT entrants (signature via la JWKS du realm). Pas de volet
      # « client » : ce service ne fait aucun appel sortant en v1.
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://localhost:8080/realms/auto-ecole/protocol/openid-connect/certs}

# Origine autorisée pour le handshake WebSocket (front Angular ; dev : localhost:4200).
communication:
  frontend-origin: ${FRONTEND_ORIGIN:http://localhost:4200}
  # URL Keycloak telles que joignables DEPUIS LE NAVIGATEUR (Swagger UI) — pas le réseau Docker.
  swagger:
    auth-url: ${KEYCLOAK_AUTH_URL:http://localhost:8080/realms/auto-ecole/protocol/openid-connect/auth}
    token-url: ${KEYCLOAK_TOKEN_URL:http://localhost:8080/realms/auto-ecole/protocol/openid-connect/token}

# Swagger UI : pré-remplit le client public Keycloak et active PKCE pour le flux authorization_code.
springdoc:
  swagger-ui:
    oauth:
      client-id: ${SWAGGER_OAUTH_CLIENT_ID:auto-ecole-frontend}
      use-pkce-with-authorization-code-grant: true

eureka:
  client:
    enabled: ${EUREKA_ENABLED:true}
    register-with-eureka: ${EUREKA_ENABLED:true}
    fetch-registry: ${EUREKA_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_RATE:1.0}   # dev: sample everything
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

server:
  port: ${SERVER_PORT:8084}