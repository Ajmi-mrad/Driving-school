spring:
  application:
    name: finance-service

  datasource:
    url: ${FINANCE_DB_URL:jdbc:postgresql://localhost:5437/financedb}
    username: ${FINANCE_DB_USER:financeuser}
    password: ${FINANCE_DB_PASSWORD:financepass}

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway possède le schéma ; Hibernate ne fait que valider
    open-in-view: false
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true

  security:
    oauth2:
      # Volet « resource server » : valide les JWT entrants (signature via la JWKS du realm).
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://localhost:8080/realms/auto-ecole/protocol/openid-connect/certs}
      # Volet « client » : obtient un jeton de service (client_credentials) pour les appels sortants.
      client:
        registration:
          keycloak:
            client-id: ${KEYCLOAK_FINANCE_CLIENT_ID:finance-service}
            client-secret: ${KEYCLOAK_FINANCE_SERVICE_SECRET:changeme}
            authorization-grant-type: client_credentials
            provider: keycloak
        provider:
          keycloak:
            token-uri: ${KEYCLOAK_TOKEN_URI:http://localhost:8080/realms/auto-ecole/protocol/openid-connect/token}

# URLs des services appelés (résolues via Eureka : http://<APPLICATION-NAME>).
finance:
  clients:
    registration-id: keycloak
    auth-service-url: ${AUTH_SERVICE_URL:http://auth-service}
    communication-service-url: ${COMMUNICATION_SERVICE_URL:http://communication-service}

eureka:
  client:
    enabled: ${EUREKA_ENABLED:true}
    register-with-eureka: ${EUREKA_ENABLED:true}
    fetch-registry: ${EUREKA_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_RATE:1.0}   # dev: sample everything
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

server:
  port: ${SERVER_PORT:8085}
