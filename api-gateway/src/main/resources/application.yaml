spring:
  application:
    name: api-gateway

  # Resource server : la Gateway valide la SIGNATURE du JWT (JWKS du realm). Les règles de rôles
  # restent appliquées par chaque microservice en aval (cahier des charges §6.3.3).
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://localhost:8080/realms/auto-ecole/protocol/openid-connect/certs}

  cloud:
    gateway:
      server:
        webflux:
          # Routage par découverte : lb://<APPLICATION-NAME> résolu via Eureka.
          routes:
            - id: auth-service
              uri: lb://auth-service
              predicates:
                - Path=/api/users/**,/api/me/**
            - id: vehicle-service
              uri: lb://vehicle-service
              predicates:
                - Path=/api/vehicles/**
            - id: finance-service
              uri: lb://finance-service
              predicates:
                - Path=/api/forfaits/**,/api/enrollments/**,/api/payments/**,/api/invoices/**
            - id: communication-service
              uri: lb://communication-service
              predicates:
                - Path=/api/conversations/**,/api/notifications/**
            # Route du handshake WebSocket/STOMP : la Gateway relaie l'« Upgrade » automatiquement
            # une fois le chemin routé vers le service (lb:// résolu via Eureka).
            - id: communication-service-ws
              uri: lb://communication-service
              predicates:
                - Path=/ws/**
          # CORS centralisé pour le frontend Angular (dev : localhost:4200).
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins: ${FRONTEND_ORIGIN:http://localhost:4200}
                allowedMethods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
                allowedHeaders: '*'
                allowCredentials: true

eureka:
  client:
    enabled: ${EUREKA_ENABLED:true}
    register-with-eureka: ${EUREKA_ENABLED:true}
    fetch-registry: ${EUREKA_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_RATE:1.0}   # dev: sample everything
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

server:
  port: ${SERVER_PORT:8222}