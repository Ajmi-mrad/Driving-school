# Cloud CD (PLACEHOLDER — manual only).
# Deploys the Helm chart to a Kubernetes cluster using a KUBECONFIG secret.
#
# INACTIVE until you:
#   1. Have a reachable cluster (managed cloud — GitHub runners can't reach a local minikube).
#   2. Add repo secret KUBECONFIG  = base64-encoded kubeconfig for that cluster.
#      (DOCKERHUB_USERNAME already exists and sets the image namespace.)
# Local development does NOT use this — use `make -f k8s/Makefile deploy` instead.
name: deploy (cloud)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g. latest or sha-<short>)"
        required: true
        default: "latest"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fail early if KUBECONFIG secret is missing
        run: |
          if [ -z "${{ secrets.KUBECONFIG }}" ]; then
            echo "::error::KUBECONFIG secret is not set. This workflow is a placeholder until a cloud cluster is configured."
            exit 1
          fi

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Write kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > "$HOME/.kube/config"

      - name: Sync realm into chart
        run: cp auth-service/realm-export.json k8s/helm/driving-school/files/realm-export.json

      - name: Helm upgrade
        run: |
          helm upgrade --install driving-school ./k8s/helm/driving-school \
            --namespace driving-school --create-namespace \
            --set global.imageTag=${{ github.event.inputs.image_tag }} \
            --wait --timeout 10m