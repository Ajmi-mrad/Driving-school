# End-to-end tests (manual). Boots the docker-compose stack, waits for the gateway to be healthy,
# then runs the live E2E suite through the api-gateway with a real Keycloak OWNER token.
#
# Requires repo secret E2E_OWNER_PASSWORD (the password of the seeded `owner` realm user). When it
# is absent the E2E suite skips itself (Assumptions), so the job still succeeds.
name: e2e (manual)

on:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      # auth-service compose creates the shared network + Keycloak + discovery + api-gateway + mailpit.
      - name: Start core stack (auth-service)
        run: docker compose -f auth-service/docker-compose.yml up -d --build

      - name: Start domain services
        run: |
          docker compose -f vehicle-service/docker-compose.yml up -d --build
          docker compose -f finance-service/docker-compose.yml up -d --build
          docker compose -f communication-service/docker-compose.yml up -d --build

      - name: Wait for the gateway to be healthy
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8222/actuator/health | grep -q '"status":"UP"'; then
              echo "gateway is up"; exit 0
            fi
            echo "waiting for gateway ($i)..."; sleep 10
          done
          echo "::error::gateway did not become healthy in time"
          docker compose -f auth-service/docker-compose.yml logs --tail=100 || true
          exit 1

      - name: Run E2E suite
        env:
          E2E_GATEWAY_URL: http://localhost:8222
          E2E_KEYCLOAK_URL: http://localhost:8080
          E2E_OWNER_PASSWORD: ${{ secrets.E2E_OWNER_PASSWORD }}
        run: mvn -B -Pe2e -pl e2e-tests verify

      - name: Tear down
        if: always()
        run: |
          docker compose -f communication-service/docker-compose.yml down -v || true
          docker compose -f finance-service/docker-compose.yml down -v || true
          docker compose -f vehicle-service/docker-compose.yml down -v || true
          docker compose -f auth-service/docker-compose.yml down -v || true
