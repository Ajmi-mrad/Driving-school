# Reusable CD: build the service's Docker image and push it to Docker Hub.
# Image name: <DOCKERHUB_USERNAME>/driving-school-<service>
# Tags: short git SHA (immutable) + latest.
name: Reusable CD

on:
  workflow_call:
    inputs:
      service:
        description: "Service directory / module name (e.g. auth-service)"
        required: true
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload Trivy SARIF to code scanning
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags & labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/driving-school-${{ inputs.service }}
          tags: |
            type=sha,format=short
            type=raw,value=latest

      - name: Build & push image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./${{ inputs.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Never cache the `runtime` stage so `apk upgrade` re-runs every build
          # and pulls current OS security patches. The Maven build stage still
          # caches (the slow part). Without this, a cached OS layer keeps stale,
          # vulnerable packages (e.g. libcurl) even after upstream fixes ship.
          no-cache-filters: runtime

      # Scan the pushed image (base-OS packages + bundled jars) — a layer
      # Dependabot doesn't see. Report-only: exit-code 0, never fails the build.
      - name: Scan image with Trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/driving-school-${{ inputs.service }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload Trivy SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-${{ inputs.service }}