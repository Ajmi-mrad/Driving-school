# Reusable CI: build + test a single service.
# Called by each per-service workflow via `uses:`.
name: Reusable CI

on:
  workflow_call:
    inputs:
      service:
        description: "Service directory / module name (e.g. auth-service)"
        required: true
        type: string

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.service }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      # Testcontainers integration tests use the Docker daemon that
      # ubuntu-latest runners provide out of the box.
      - name: Build & test
        run: ./mvnw -B verify