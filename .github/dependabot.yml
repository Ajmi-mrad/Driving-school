version: 2
updates:
  # Maven dependencies for each service module (root pom is an aggregator with no deps).
  - package-ecosystem: maven
    directories:
      - "/discovery-service"
      - "/api-gateway"
      - "/auth-service"
      - "/booking-service"
      - "/communication-service"
      - "/vehicle-service"
      - "/finance-service"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    # Bundle all minor/patch bumps per module into ONE PR (majors stay separate).
    groups:
      maven-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    ignore:
      # Spring Cloud 2025.1.x targets Spring Boot 3.6 / Framework 7 and pulls in
      # classes (e.g. RestClientHttpServiceGroupConfigurer) absent from our Boot 3.5
      # line, breaking every service's contextLoads test. Stay on the 2025.0 train
      # until spring-boot-starter-parent is bumped to a compatible major.
      - dependency-name: "org.springframework.cloud:spring-cloud-dependencies"
        versions: [">=2025.1.0"]

  # GitHub Actions used in the workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - ci
    groups:
      github-actions:
        patterns:
          - "*"