version: 2
updates:
  # Maven dependencies for each service module (root pom is an aggregator with no deps).
  - package-ecosystem: maven
    directories:
      - "/discovery-service"
      - "/api-gateway"
      - "/auth-service"
      - "/booking-service"
      - "/communication-service"
      - "/vehicle-service"
      - "/finance-service"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies

  # GitHub Actions used in the workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - ci