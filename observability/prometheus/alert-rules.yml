groups:
  - name: driving-school
    rules:
      # A scraped service has been unreachable for >1m.
      - alert: ServiceDown
        expr: up{job="spring-actuator"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.instance }} is down"
          description: "{{ $labels.instance }} has failed scraping for over 1 minute."

      # More than 1 HTTP 5xx per second (5m average) for a service.
      - alert: HighHttp5xxRate
        expr: sum by (application) (rate(http_server_requests_seconds_count{status=~"5.."}[5m])) > 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx rate on {{ $labels.application }}"
          description: "{{ $labels.application }} is serving >1 HTTP 5xx/s (5m avg)."

      # JVM heap usage above 90% for 5m.
      - alert: HighJvmHeapUsage
        expr: >
          sum by (application) (jvm_memory_used_bytes{area="heap"})
            / sum by (application) (jvm_memory_max_bytes{area="heap"}) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High JVM heap usage on {{ $labels.application }}"
          description: "{{ $labels.application }} heap usage has been >90% for 5 minutes."
