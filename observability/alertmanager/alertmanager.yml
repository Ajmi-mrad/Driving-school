# Alerts are delivered by SMTP to the existing Mailpit container (dev inbox at
# http://localhost:8025). Mailpit accepts any credentials and no TLS.
global:
  smtp_smarthost: "mailpit:1025"
  smtp_from: "alertmanager@driving-school.local"
  smtp_require_tls: false

route:
  receiver: email
  group_by: ["alertname"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h

receivers:
  - name: email
    email_configs:
      - to: "dev@driving-school.local"
        send_resolved: true
