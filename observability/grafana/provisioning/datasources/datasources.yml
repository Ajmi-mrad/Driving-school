apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    jsonData:
      # Turn a trace id found in a log line into a link to the Jaeger trace.
      derivedFields:
        - name: TraceID
          matcherRegex: '(?:trace_id|traceId)[=:"\s]+(\w+)'
          url: "$${__value.raw}"
          datasourceUid: jaeger

  - name: Jaeger
    type: jaeger
    uid: jaeger
    access: proxy
    url: http://jaeger:16686
    jsonData:
      # Jump from a trace's span to the matching logs in Loki.
      tracesToLogsV2:
        datasourceUid: loki
        filterByTraceID: true
