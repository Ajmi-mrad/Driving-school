# ============================================================================
# Local observability stack for the Driving School platform.
#
#   Prometheus     -> scrapes each service's /actuator/prometheus (metrics)
#   Grafana        -> dashboards over Prometheus / Loki / Jaeger
#   OTel Collector -> receives OTLP traces from the apps -> Jaeger,
#                     tails container logs -> Loki
#   Jaeger         -> distributed tracing UI
#   Loki           -> log aggregation
#   Alertmanager   -> routes Prometheus alerts to Mailpit (email)
#   node-exporter / cadvisor -> host & container infrastructure metrics
#
# Joins the SAME external network as the app stacks (auth-service_auto-ecole),
# so Prometheus/Collector reach the services by name and Alertmanager reaches
# the existing `mailpit` container. Start the app stacks first (auth-service
# compose creates the network + mailpit), then bring this up.
#
#   docker compose -f observability/docker-compose.yml up -d
# ============================================================================
name: driving-school-observability

services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
    volumes:
      - ./prometheus:/etc/prometheus:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    volumes:
      - ./alertmanager:/etc/alertmanager:ro
    ports:
      - "9093:9093"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on: [prometheus, loki, jaeger]
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.109.0
    container_name: otel-collector
    # root so the filelog receiver can read /var/lib/docker/containers/*.log
    user: "0:0"
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector/config.yaml:/etc/otel/config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "4317:4317"   # OTLP gRPC (apps push traces here)
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # collector's own metrics (scraped by Prometheus)
    depends_on: [jaeger, loki]
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
    restart: unless-stopped

  loki:
    image: grafana/loki:3.1.1
    container_name: loki
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    pid: host
    command:
      - --path.rootfs=/host
    volumes:
      - /:/host:ro,rslave
    ports:
      - "9100:9100"
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8090:8080"   # host 8090 (8080 is taken by Keycloak); scraped internally on :8080
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
  loki-data:

networks:
  default:
    name: auth-service_auto-ecole
    external: true
