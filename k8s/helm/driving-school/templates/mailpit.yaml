# Mailpit: dev SMTP sink (captures Keycloak emails). Web UI on 8025, SMTP on 1025.
apiVersion: v1
kind: Service
metadata:
  name: mailpit
  labels:
    {{- include "ds.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "ds.selectorLabels" (dict "name" "mailpit") | nindent 4 }}
  ports:
    - name: smtp
      port: 1025
      targetPort: 1025
    - name: web
      port: 8025
      targetPort: 8025
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailpit
  labels:
    {{- include "ds.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "ds.selectorLabels" (dict "name" "mailpit") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ds.labels" . | nindent 8 }}
        {{- include "ds.selectorLabels" (dict "name" "mailpit") | nindent 8 }}
    spec:
      containers:
        - name: mailpit
          image: {{ .Values.mailpit.image }}
          ports:
            - containerPort: 1025
            - containerPort: 8025