# ============================================================================
# Default values for the Driving School umbrella chart.
# These defaults are fully internal (cluster DNS only) so the backend works
# without ingress. Browser-facing Keycloak URLs + ingress hosts are layered on
# in values-local.yaml (minikube) or a cloud values file.
# ============================================================================

global:
  # Images published by CI: ajmimrad/driving-school-<service>
  imageRepoPrefix: ajmimrad/driving-school
  imageTag: latest
  imagePullPolicy: Always

realm: auto-ecole

keycloak:
  image: quay.io/keycloak/keycloak:26.6.3
  internalUrl: http://keycloak:8080
  # Browser-facing base URL (login pages, token endpoint used by Swagger UI).
  # Overridden to the ingress host in values-local.yaml.
  externalUrl: http://keycloak:8080
  adminUser: admin

postgres:
  image: postgres:16-alpine
  superUser: postgres
  storage: 2Gi

mailpit:
  image: axllent/mailpit:latest

ingress:
  enabled: true
  className: nginx
  apiHost: api.driving-school.local
  keycloakHost: keycloak.driving-school.local
  eurekaEnabled: true
  eurekaHost: eureka.driving-school.local

# ---------------------------------------------------------------------------
# Secret values (dev defaults; matches realm-export.json so local "just works").
# Override every value for cloud via `-f values-secrets.yaml` or `--set`.
# Placeholders you must replace for production are marked CHANGEME.
# ---------------------------------------------------------------------------
secrets:
  POSTGRES_SUPER_PASSWORD: postgres
  AUTH_DB_PASSWORD: authpass
  VEHICLE_DB_PASSWORD: vehiclepass
  BOOKING_DB_PASSWORD: bookingpass
  COMMUNICATION_DB_PASSWORD: communicationpass
  FINANCE_DB_PASSWORD: financepass
  KC_DB_PASSWORD: keycloak
  KEYCLOAK_ADMIN_PASSWORD: admin
  # Keycloak client secrets (client_credentials). auth/finance match realm-export.json.
  AUTH_SERVICE_CLIENT_SECRET: KAy4oDfhP3EwmMGluIeVmFC8NgS7bE1I
  FINANCE_SERVICE_CLIENT_SECRET: financeServiceSecretChangeMe
  BOOKING_SERVICE_CLIENT_SECRET: changeme # CHANGEME: booking-service realm client not yet defined

# Databases created inside the shared Postgres by its init script.
# passwordKey references a key in the Secret above.
databases:
  - { name: authdb, user: authuser, passwordKey: AUTH_DB_PASSWORD }
  - { name: vehicledb, user: vehicleuser, passwordKey: VEHICLE_DB_PASSWORD }
  - { name: bookingdb, user: bookinguser, passwordKey: BOOKING_DB_PASSWORD }
  - { name: communicationdb, user: communicationuser, passwordKey: COMMUNICATION_DB_PASSWORD }
  - { name: financedb, user: financeuser, passwordKey: FINANCE_DB_PASSWORD }
  - { name: keycloak, user: keycloak, passwordKey: KC_DB_PASSWORD }

# ---------------------------------------------------------------------------
# Spring services. The reusable template (_springservice.tpl) renders a
# Deployment + Service for each. Common env (SERVER_PORT, Eureka, JWKS) is
# injected by the template based on the flags below, so only service-specific
# config lives here.
#   eurekaClient : registers with Eureka + prefer-ip-address (K8s-safe)
#   jwks         : inject KEYCLOAK_JWKS_URI (resource server)
#   waitForPostgres : add an init-container that blocks until Postgres is up
# ---------------------------------------------------------------------------
services:
  discovery-service:
    port: 8761
    replicas: 1
    eurekaClient: false
    jwks: false
    waitForPostgres: false
    env:
      EUREKA_SELF_PRESERVATION: "false"

  api-gateway:
    port: 8222
    replicas: 1
    eurekaClient: true
    jwks: true
    waitForPostgres: false
    env:
      FRONTEND_ORIGIN: http://localhost:4200

  auth-service:
    port: 8081
    replicas: 1
    eurekaClient: true
    jwks: true
    waitForPostgres: true
    env:
      AUTH_DB_URL: jdbc:postgresql://postgres:5432/authdb
      AUTH_DB_USER: authuser
      KEYCLOAK_SERVER_URL: http://keycloak:8080
      KEYCLOAK_REALM: auto-ecole
      KEYCLOAK_CLIENT_ID: auth-service
      SWAGGER_OAUTH_CLIENT_ID: auto-ecole-frontend
      # Browser-facing (Swagger) — pointed at the ingress host in values-local.yaml.
      KEYCLOAK_AUTH_URL: http://keycloak:8080/realms/auto-ecole/protocol/openid-connect/auth
      KEYCLOAK_TOKEN_URL: http://keycloak:8080/realms/auto-ecole/protocol/openid-connect/token
    secretEnv:
      AUTH_DB_PASSWORD: AUTH_DB_PASSWORD
      KEYCLOAK_AUTH_SERVICE_SECRET: AUTH_SERVICE_CLIENT_SECRET

  vehicle-service:
    port: 8082
    replicas: 1
    eurekaClient: true
    jwks: true
    waitForPostgres: true
    env:
      VEHICLE_DB_URL: jdbc:postgresql://postgres:5432/vehicledb
      VEHICLE_DB_USER: vehicleuser
    secretEnv:
      VEHICLE_DB_PASSWORD: VEHICLE_DB_PASSWORD

  booking-service:
    port: 8083
    replicas: 1
    eurekaClient: true
    jwks: true
    waitForPostgres: true
    env:
      BOOKING_DB_URL: jdbc:postgresql://postgres:5432/bookingdb
      BOOKING_DB_USER: bookinguser
      KEYCLOAK_BOOKING_CLIENT_ID: booking-service
      KEYCLOAK_TOKEN_URI: http://keycloak:8080/realms/auto-ecole/protocol/openid-connect/token
      AUTH_SERVICE_URL: http://auth-service
      VEHICLE_SERVICE_URL: http://vehicle-service
      FINANCE_SERVICE_URL: http://finance-service
    secretEnv:
      BOOKING_DB_PASSWORD: BOOKING_DB_PASSWORD
      KEYCLOAK_BOOKING_SERVICE_SECRET: BOOKING_SERVICE_CLIENT_SECRET

  communication-service:
    port: 8084
    replicas: 1
    eurekaClient: true
    jwks: true
    waitForPostgres: true
    env:
      COMMUNICATION_DB_URL: jdbc:postgresql://postgres:5432/communicationdb
      COMMUNICATION_DB_USER: communicationuser
      SWAGGER_OAUTH_CLIENT_ID: auto-ecole-frontend
      FRONTEND_ORIGIN: http://localhost:4200
      # Browser-facing (Swagger) — pointed at the ingress host in values-local.yaml.
      KEYCLOAK_AUTH_URL: http://keycloak:8080/realms/auto-ecole/protocol/openid-connect/auth
      KEYCLOAK_TOKEN_URL: http://keycloak:8080/realms/auto-ecole/protocol/openid-connect/token
    secretEnv:
      COMMUNICATION_DB_PASSWORD: COMMUNICATION_DB_PASSWORD

  finance-service:
    port: 8085
    replicas: 1
    eurekaClient: true
    jwks: true
    waitForPostgres: true
    env:
      FINANCE_DB_URL: jdbc:postgresql://postgres:5432/financedb
      FINANCE_DB_USER: financeuser
      KEYCLOAK_FINANCE_CLIENT_ID: finance-service
      KEYCLOAK_TOKEN_URI: http://keycloak:8080/realms/auto-ecole/protocol/openid-connect/token
      AUTH_SERVICE_URL: http://auth-service
      COMMUNICATION_SERVICE_URL: http://communication-service
    secretEnv:
      FINANCE_DB_PASSWORD: FINANCE_DB_PASSWORD
      KEYCLOAK_FINANCE_SERVICE_SECRET: FINANCE_SERVICE_CLIENT_SECRET