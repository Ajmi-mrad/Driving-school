spring:
  application:
    name: discovery-service

# Serveur Eureka autonome : il n'enregistre pas et ne récupère pas le registre auprès de lui-même.
eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
  server:
    # Désactive le mode auto-préservation en dev pour radier vite les instances mortes.
    enable-self-preservation: ${EUREKA_SELF_PRESERVATION:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_RATE:1.0}   # dev: sample everything
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

server:
  port: ${SERVER_PORT:8761}